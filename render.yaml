services:
  - type: web
    name: srijan-backend
    env: docker
    dockerContext: srijan-backend
    dockerfilePath: srijan-backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: srijan-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: srijan-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: srijan-db
          property: password
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: srijan-db
    plan: free
    postgresMajorVersion: 15
