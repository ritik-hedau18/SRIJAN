<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0a0f1e"/>
            <stop offset="100%" stop-color="#0f1a2e"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="900" height="620" fill="url(#bg)" rx="12"/>

    <!-- Grid -->
    <g stroke="#ffffff" stroke-width="0.3" opacity="0.035">
        <line x1="0" y1="80" x2="900" y2="80"/>
        <line x1="0" y1="180" x2="900" y2="180"/>
        <line x1="0" y1="280" x2="900" y2="280"/>
        <line x1="0" y1="380" x2="900" y2="380"/>
        <line x1="0" y1="480" x2="900" y2="480"/>
        <line x1="0" y1="580" x2="900" y2="580"/>
        <line x1="150" y1="0" x2="150" y2="620"/>
        <line x1="300" y1="0" x2="300" y2="620"/>
        <line x1="450" y1="0" x2="450" y2="620"/>
        <line x1="600" y1="0" x2="600" y2="620"/>
        <line x1="750" y1="0" x2="750" y2="620"/>
    </g>

    <!-- Title -->
    <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#f8fafc" letter-spacing="3">SRIJAN</text>
    <text x="450" y="56" text-anchor="middle" font-size="11" fill="#475569" letter-spacing="2">SPRING AI · REAL-TIME INTELLIGENT JAVA APP NARRATOR · SPRING BOOT 3 · JWT · GROQ · POSTGRESQL</text>

    <!-- ── CLIENT ── -->
    <rect x="375" y="70" width="150" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="450" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Client / User</text>

    <!-- Arrow down to REST API -->
    <line x1="450" y1="110" x2="450" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- ── REST API LAYER ── -->
    <rect x="175" y="142" width="550" height="60" rx="10" fill="#1a1f3a" stroke="#6366f1" stroke-width="1.5"/>
    <text x="450" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#e0e7ff">Spring Boot REST API</text>
    <text x="450" y="190" text-anchor="middle" font-size="11" fill="#818cf8">Spring Security · JWT Auth · Role-Based Authorization · Swagger UI · :8080</text>

    <!-- Fan-out arrows to 3 modules -->
    <line x1="300" y1="202" x2="145" y2="260" stroke="#22c55e" stroke-width="1" opacity="0.5" marker-end="url(#arr-green)"/>
    <line x1="450" y1="202" x2="450" y2="260" stroke="#22c55e" stroke-width="1" opacity="0.5" marker-end="url(#arr-green)"/>
    <line x1="600" y1="202" x2="755" y2="260" stroke="#22c55e" stroke-width="1" opacity="0.5" marker-end="url(#arr-green)"/>

    <!-- ── MODULES ROW ── -->

    <!-- Spring Security -->
    <rect x="40" y="262" width="210" height="56" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
    <text x="145" y="286" text-anchor="middle" font-size="12" font-weight="700" fill="#bbf7d0">Spring Security</text>
    <text x="145" y="306" text-anchor="middle" font-size="10" fill="#4ade80">Auth · JWT filter</text>

    <!-- Spring AI Service -->
    <rect x="345" y="262" width="210" height="56" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
    <text x="450" y="286" text-anchor="middle" font-size="12" font-weight="700" fill="#bbf7d0">Spring AI Service</text>
    <text x="450" y="306" text-anchor="middle" font-size="10" fill="#4ade80">Prompts · parsing</text>

    <!-- PostgreSQL -->
    <rect x="650" y="262" width="210" height="56" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="755" y="286" text-anchor="middle" font-size="12" font-weight="700" fill="#93c5fd">PostgreSQL</text>
    <text x="755" y="306" text-anchor="middle" font-size="10" fill="#60a5fa">Users · history</text>

    <!-- Arrow from Spring AI to Groq -->
    <line x1="450" y1="318" x2="450" y2="352" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- ── GROQ LLAMA ── -->
    <rect x="175" y="354" width="550" height="60" rx="10" fill="#1c1800" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="450" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#fef3c7">Groq LLaMA API</text>
    <text x="450" y="400" text-anchor="middle" font-size="11" fill="#fbbf24">via Spring AI OpenAI-compatible client · LLaMA 3.x · Groq Cloud</text>

    <!-- Arrow to Generated Code -->
    <line x1="450" y1="414" x2="450" y2="448" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- ── GENERATED CODE OUTPUT ── -->
    <rect x="175" y="450" width="550" height="60" rx="10" fill="#0d2618" stroke="#22c55e" stroke-width="1.5"/>
    <text x="450" y="476" text-anchor="middle" font-size="14" font-weight="700" fill="#bbf7d0">Generated Spring Boot Code</text>
    <text x="450" y="496" text-anchor="middle" font-size="11" fill="#4ade80">Controllers · Services · Repositories · Entities · pom.xml</text>

    <!-- ── GENERATION FLOW ── -->
    <text x="450" y="538" text-anchor="middle" font-size="10" fill="#475569" letter-spacing="1">GENERATION FLOW</text>
    <line x1="200" y1="543" x2="355" y2="543" stroke="#334155" stroke-width="0.5"/>
    <line x1="545" y1="543" x2="700" y2="543" stroke="#334155" stroke-width="0.5"/>

    <!-- Flow pills -->
    <rect x="115" y="550" width="100" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="165" y="568" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">User Input</text>

    <line x1="215" y1="564" x2="243" y2="564" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="245" y="550" width="110" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="300" y="568" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">Prompt Build</text>

    <line x1="355" y1="564" x2="383" y2="564" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="385" y="550" width="110" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="440" y="568" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">LLM Request</text>

    <line x1="495" y1="564" x2="523" y2="564" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="525" y="550" width="125" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="587" y="568" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">Parse Response</text>

    <line x1="650" y1="564" x2="678" y2="564" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="680" y="550" width="105" height="28" rx="14" fill="#134e4a" stroke="#10b981" stroke-width="1.5"/>
    <text x="732" y="568" text-anchor="middle" font-size="10" font-weight="600" fill="#6ee7b7">Code Output</text>

    <!-- ── LEGEND ── -->
    <line x1="220" y1="600" x2="240" y2="600" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="245" y="604" font-size="10" fill="#475569">Service routing</text>

    <line x1="350" y1="600" x2="370" y2="600" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="375" y="604" font-size="10" fill="#475569">Data flow</text>

    <line x1="460" y1="600" x2="480" y2="600" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>
    <text x="485" y="604" font-size="10" fill="#475569">AI / LLM call</text>
</svg>